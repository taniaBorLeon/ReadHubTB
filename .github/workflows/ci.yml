name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancela una ejecución en curso de la misma rama/PR cuando llega un nuevo
# push, en vez de dejar corriendo (y consumiendo minutos de CI) una revisión
# ya obsoleta.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Solo lectura del repositorio: este pipeline valida, no despliega ni
# escribe en el repo (sin comentarios de PR, sin publicar paquetes, etc.).
permissions:
  contents: read

env:
  NODE_VERSION: "24"

jobs:
  # -----------------------------------------------------------------------
  # TypeScript + ESLint + Vitest sobre los 7 workspaces del monorepo. No
  # depende de Supabase/OpenAI/Anthropic reales (los servicios con
  # `import "server-only"` se prueban con mocks, ver packages/ai/src/**.test.ts).
  # -----------------------------------------------------------------------
  checks:
    name: TypeScript, ESLint y Vitest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Caché del cache de tareas de Turborepo (distinto de la caché de
      # dependencias de npm ya cubierta por actions/setup-node de arriba):
      # si el hash de una tarea no cambió desde una ejecución anterior,
      # turbo la sirve desde aquí en vez de re-ejecutarla.
      - name: Restaurar caché de Turborepo
        uses: actions/cache@v4
        with:
          path: |
            .turbo/cache
            apps/*/.turbo/cache
            packages/*/.turbo/cache
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            turbo-${{ runner.os }}-

      - name: Instalar dependencias
        run: npm ci

      - name: TypeScript (turbo run typecheck)
        run: npm run typecheck

      - name: ESLint (turbo run lint)
        run: npm run lint

      # --reporter=default conserva la salida legible habitual en los logs;
      # --reporter=junit además escribe un artefacto de prueba por paquete
      # (vitest-report.xml), que no se genera en `npm run test` normal.
      # Se invoca turbo directamente (no vía `npm run test --`) porque turbo
      # necesita su propio separador `--` para reenviar estos flags a
      # `vitest run` en cada paquete; con `npm run test -- ...` turbo los
      # interpreta como flags propios y falla.
      - name: Vitest (turbo run test)
        run: npx turbo run test -- --reporter=default --reporter=junit --outputFile.junit=vitest-report.xml

      - name: Publicar artefactos de Vitest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-report
          path: "**/vitest-report.xml"
          retention-days: 7
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  # Playwright E2E: arranca la app real (`next dev`) contra un proyecto de
  # Supabase real -- necesita las credenciales configuradas como Secrets del
  # repositorio (Settings > Secrets and variables > Actions). Sin ellas este
  # job falla de forma explícita en vez de saltarse la validación en
  # silencio: no hay atajos para evitar depender del backend real.
  # -----------------------------------------------------------------------
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegador de Playwright (Chromium)
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      # Ningún valor sensible vive en este archivo: todos se leen de
      # Secrets del repositorio en tiempo de ejecución. Si faltan, Next.js
      # arranca igual pero la autenticación real fallará (comportamiento
      # esperado, no un bug del pipeline) -- exactamente el mismo límite ya
      # documentado en apps/web/e2e/data/users.ts.
      - name: Playwright E2E (turbo run test:e2e)
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      # El reporte HTML se genera siempre (reporter: "html" en
      # playwright.config.ts); capturas y trazas en test-results/ solo
      # existen cuando algún test falló (screenshot/trace configurados
      # "only-on-failure"/"on-first-retry") -- por eso ambos pasos van con
      # if-no-files-found: ignore en vez de condicionarlos a failure(): el
      # propio contenido generado ya distingue "hubo errores" de "todo pasó".
      - name: Publicar reporte HTML de Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
          if-no-files-found: ignore

      - name: Publicar capturas y trazas de fallos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results
          retention-days: 7
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  # Auditoría de rendimiento: solo corre si `checks` y `e2e` ya pasaron (no
  # tiene sentido medir el rendimiento de un build cuyo comportamiento
  # funcional todavía no está validado). Genera el Production Build real,
  # mide el tamaño del bundle contra un umbral fijo y audita Core Web Vitals
  # con Lighthouse CI sobre el servidor de producción ya construido. Si
  # cualquiera de los dos controles falla, este job falla y el job `deploy`
  # (que depende de él) nunca se ejecuta -- así es como se bloquea el
  # despliegue sin necesitar lógica adicional de aprobación manual.
  # -----------------------------------------------------------------------
  performance:
    name: Performance Budget (Build, Bundle Size, Lighthouse)
    runs-on: ubuntu-latest
    needs: [checks, e2e]
    env:
      # Límite del bundle compartido por todas las páginas ("First Load JS
      # shared by all" en la tabla que imprime `next build`). Es el costo de
      # JS que paga cualquier ruta de la app; un límite fijo aquí evita que
      # una dependencia nueva o un import mal ubicado lo infle sin que nadie
      # lo note hasta producción.
      BUNDLE_SIZE_LIMIT_KB: 200
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      # Mismas variables que ya usa el job `e2e`: NEXT_PUBLIC_* se inlinean
      # en el bundle del cliente durante el build, y el resto las necesita
      # `next start` en el paso de Lighthouse más abajo (el middleware llama
      # a Supabase Auth en cada request, incluida la home que Lighthouse
      # visita).
      - name: Generar Production Build (turbo run build)
        run: npx turbo run build --filter=web | tee build-output.log
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      # Lee la tabla que `next build` ya imprime por stdout (columna "First
      # Load JS") en vez de agregar un analizador de bundle como dependencia
      # nueva -- el propio build de Next ya calcula y muestra estos números.
      - name: Analizar tamaño del bundle
        run: |
          SHARED_LINE=$(grep -E "First Load JS shared by all" build-output.log || true)
          if [ -z "$SHARED_LINE" ]; then
            echo "No se encontró la línea 'First Load JS shared by all' en la salida de next build."
            echo "$(cat build-output.log)"
            exit 1
          fi

          SHARED_KB=$(echo "$SHARED_LINE" | grep -oE "[0-9]+(\.[0-9]+)? kB" | head -1 | grep -oE "[0-9]+(\.[0-9]+)?")
          echo "First Load JS compartido: ${SHARED_KB} kB (límite: ${BUNDLE_SIZE_LIMIT_KB} kB)"

          {
            echo "# Reporte de tamaño de bundle"
            echo ""
            echo "- First Load JS compartido: ${SHARED_KB} kB (límite: ${BUNDLE_SIZE_LIMIT_KB} kB)"
            echo ""
            echo '```'
            grep -A 100 "Route (app)" build-output.log || true
            echo '```'
          } > bundle-size-report.md

          awk -v val="$SHARED_KB" -v limit="$BUNDLE_SIZE_LIMIT_KB" 'BEGIN { exit !(val > limit) }' \
            && { echo "❌ El bundle compartido (${SHARED_KB} kB) supera el límite (${BUNDLE_SIZE_LIMIT_KB} kB)."; exit 1; } \
            || echo "✅ Bundle dentro del límite."
        working-directory: apps/web

      - name: Publicar reporte de tamaño de bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report
          path: apps/web/bundle-size-report.md
          retention-days: 30
          if-no-files-found: ignore

      # Lighthouse CI arranca `next start` sobre el build ya generado
      # (startServerCommand) y audita las páginas públicas de la app --
      # /login y /register son las únicas accesibles sin una sesión real de
      # Supabase, así que son las únicas que se pueden auditar en CI sin
      # simular un login completo. Los umbrales de aprobación/rechazo viven
      # en apps/web/lighthouserc.json, no aquí.
      - name: Auditoría Lighthouse (Core Web Vitals)
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:3000/login
            http://localhost:3000/register
          configPath: apps/web/lighthouserc.json
          startServerCommand: npm run start --workspace=web
          startServerReadyPattern: "Ready in"
          startServerReadyTimeout: 60000
          runs: 3
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # -----------------------------------------------------------------------
  # Despliegue a Vercel. Solo corre en push a main/master (nunca en PRs) y
  # solo si checks + e2e + performance ya pasaron -- `needs` es justamente el
  # mecanismo de bloqueo: si `performance` falla (umbrales incumplidos), este
  # job se salta automáticamente, sin lógica adicional de aprobación.
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy a Vercel (Production)
    runs-on: ubuntu-latest
    needs: [checks, e2e, performance]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      # Flujo oficial de Vercel para repos sin la integración nativa de Git:
      # pull (trae la config + variables de entorno ya configuradas en el
      # proyecto de Vercel) -> build (usa esa config para producir el
      # artefacto desplegable) -> deploy (sube el artefacto ya construido,
      # sin reconstruir nada del lado de Vercel).
      - name: Vercel — pull de configuración de producción
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

      - name: Vercel — build de producción
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

      - name: Vercel — deploy (prebuilt)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
        working-directory: apps/web
